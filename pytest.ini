[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output. No automatic test reruns (saves time; fix failures instead).
# NOTE: report wiring (pytest-html / Allure) is decided dynamically in
# conftest.py (interactive prompt / --report flag / CI), so no report dir is
# hard-coded here.
addopts =
    -ra
    -v
    --strict-markers

# Logging: console (PowerShell) stays quiet (WARNING+); full DEBUG trace is in logs/run_*.log.
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

markers =
    smoke: TASK 1 + TASK 2 assignment scope — UI flow (login, project, case, run) + execution suite (TC-016..TC-026)
    positive: positive scenarios
    negative: negative scenarios
    edge: edge-case scenarios
    e2e: full end-to-end flow
    execution: test-run execution / results scenarios (TASK 2)
